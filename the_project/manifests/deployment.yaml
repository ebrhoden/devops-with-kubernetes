apiVersion: apps/v1
kind: Deployment
metadata:
  name: todoapp-dep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todoapp
  template:
    metadata:
      labels:
        app: todoapp
    spec:
      containers:
        - name: todoapp
          image: ebrhoden/todo_app:0.0.4
          env:
            - name: MESSAGE
              value: "This is a message from the environment variable. An image should be displayed below."
            - name: CACHE_SECONDS
              value: "20"
          volumeMounts:
            - name: image-storage
              mountPath: /data
      volumes:
        - name: image-storage
          persistentVolumeClaim:
            claimName: todoapp-pvc